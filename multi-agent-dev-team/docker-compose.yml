services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build: .
    env_file:
      - .env.example
    depends_on:
      chroma:
        condition: service_healthy
    volumes:
      - ./workspace:/app/workspace
      - ./docs/cost_reports:/app/docs/cost_reports